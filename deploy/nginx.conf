# ============================================================
#  AURELIA — nginx reverse proxy for the Next.js standalone server
#  Replace `aurelia.example.com` with your domain.
#
#  1) Put the `map` block in the http{} context, e.g. copy it to
#     /etc/nginx/conf.d/ws-upgrade.conf
#  2) Put the server blocks in /etc/nginx/sites-available/aurelia
#     and symlink into sites-enabled.
#  3) `certbot --nginx -d aurelia.example.com` will inject the TLS lines.
# ============================================================

# --- http context (e.g. /etc/nginx/conf.d/ws-upgrade.conf) ---
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# --- HTTP: redirect to HTTPS (certbot manages this) ---
server {
    listen 80;
    listen [::]:80;
    server_name aurelia.example.com;

    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

# --- HTTPS: reverse proxy to the Next.js server on 127.0.0.1:3000 ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name aurelia.example.com;

    # Managed by Certbot (created by `certbot --nginx`)
    ssl_certificate     /etc/letsencrypt/live/aurelia.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aurelia.example.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    # Long-lived immutable Next.js build assets.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket upgrade headers — NOT needed for Gemini Live (the browser
        # connects directly to Google), but harmless and future-proof.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Stream RSC / Suspense responses without buffering.
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
